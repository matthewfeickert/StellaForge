name: Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'mvp/pixi.toml'
      - 'mvp/pixi.lock'
      - 'mvp/Dockerfile'
      - 'mvp/.dockerignore'
  pull_request:
    paths:
      - 'mvp/pixi.toml'
      - 'mvp/pixi.lock'
      - 'mvp/Dockerfile'
      - 'mvp/.dockerignore'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build ${{ matrix.image-tag }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Stage 1: Equilibrium
          - environment: stage-1-vmec
            image-tag: stage-1-vmec-cpu
          - environment: stage-1-vmec-gpu
            cuda-version: "12"
            image-tag: stage-1-vmec-gpu
          # Stage 2: Boozer Transform
          - environment: stage-2-booz
            image-tag: stage-2-booz-cpu
          - environment: stage-2-booz-gpu
            cuda-version: "12"
            image-tag: stage-2-booz-gpu
          # Stage 3: Neoclassical Transport
          - environment: stage-3-sfincs
            image-tag: stage-3-sfincs-cpu
          - environment: stage-3-sfincs-gpu
            cuda-version: "12"
            image-tag: stage-3-sfincs-gpu
          # Stage 4: Turbulence
          - environment: stage-4-spectrax
            image-tag: stage-4-spectrax-cpu
          - environment: stage-4-spectrax-gpu
            cuda-version: "12"
            image-tag: stage-4-spectrax-gpu
          # Stage 5: Transport
          - environment: stage-5-neopax
            image-tag: stage-5-neopax-cpu
          - environment: stage-5-neopax-gpu
            cuda-version: "12"
            image-tag: stage-5-neopax-gpu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Docker image
        uses: ./.github/actions/build-docker
        with:
          environment: ${{ matrix.environment }}
          image-tag: ${{ matrix.image-tag }}
          cuda-version: ${{ matrix.cuda-version || '' }}
          # Only deploy on the main project
          push: ${{ github.event_name != 'pull_request' && github.repository == 'rkhashmani/stellaforge' }}
          registry-username: ${{ github.repository_owner }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
